# Server
server.port=5000

# Database
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:gestion_stock_gs}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
systemgs.app.jwtSecret=${JWT_SECRET:your_super_secret_jwt_key_change_in_production}
systemgs.app.jwtExpirationMs=604800000

# Cloudinary
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:dwjsq4h0n}
cloudinary.api_key=${CLOUDINARY_API_KEY:419694276273268}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:o76z0bY22l-Bw0Rz0l82_024n88}

# Mail
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:your_email@gmail.com}
spring.mail.password=${SMTP_PASS:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${SMTP_USER:your_email@gmail.com}
spring.mail.from.name=${SMTP_FROM_NAME:Gestion de Stock}

# Admin
app.admin.email=${ADMIN_EMAIL:admin@your-store.ma}

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
